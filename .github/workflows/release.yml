# opencode-container-server — Inno Setup Installer Build
# Triggered by pushing a tag like v1.0.1
# Builds the .exe installer, uploads it to the GitHub Release as a draft.
#
# Usage:
#   git tag v1.0.1
#   git push --tags
#
# Then smoke-test the draft release .exe and publish via GitHub UI.

name: Build Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress
        shell: pwsh

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            opencode-container-server.iss `
            /DAppVersion=${{ github.ref_name }} `
            /Qp
        shell: pwsh

      - name: Verify artifact
        run: |
          $artifact = Get-ChildItem -Path . -Filter "opencode-container-server-setup.exe" -Recurse | Select-Object -First 1
          if (-not $artifact) { throw "No installer .exe found" }
          $size = [math]::Round($artifact.Length / 1MB, 1)
          $sha = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName).Hash
          Write-Host "Installer: $($artifact.Name) ($size MB)"
          Write-Host "SHA-256: $sha"
        shell: pwsh

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifact = Get-ChildItem -Path . -Filter "opencode-container-server-setup.exe" -Recurse | Select-Object -First 1
          if (-not $artifact) { throw "No installer found for upload" }

          # Check if release exists already
          $releaseExists = $false
          try {
            gh release view ${{ github.ref_name }} --json name 2>$null | Out-Null
            $releaseExists = $true
          } catch {}

          if (-not $releaseExists) {
            gh release create ${{ github.ref_name }} `
              $artifact.FullName `
              --title "${{ github.ref_name }}" `
              --notes "See install instructions in BUILD.md" `
              --draft
          } else {
            gh release upload ${{ github.ref_name }} `
              $artifact.FullName `
              --clobber
          }
        shell: pwsh
