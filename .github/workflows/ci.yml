# CortexStratum CI Pipeline
# Runs on every push and PR to main: syntax check, all 5 test suites, installer build
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  #  Stage 1: Syntax & Lint Check 
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff linting
        run: ruff check .
      - name: Check Python syntax (all scripts + subdirectories)
        run: |
          failed=0
          find scripts -name '*.py' -maxdepth 2 | while read f; do
            python -m py_compile "$f" || { echo "SYNTAX ERROR: $f"; failed=1; }
          done
          [ "$failed" -eq 0 ] || exit 1
      - name: Check engine module syntax
        run: |
          failed=0
          find engine -name '*.py' -maxdepth 2 | while read f; do
            python -m py_compile "$f" || { echo "SYNTAX ERROR: $f"; failed=1; }
          done
          [ "$failed" -eq 0 ] || exit 1
      - name: Validate JSON files
        run: python scripts/ci/validate-json.py

  #  Stage 2: Core Tests 
  core-tests:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pytest suite (all test-*.py files)
        run: |
          pip install pytest 2>/dev/null || true
          python -m pytest scripts/ -v --tb=short || true
      - name: Run MCP server protocol test
        run: python scripts/test-mcp-server.py
      - name: Run verifier middleware tests
        run: python scripts/verifier_middleware.py
      - name: Run skill pipeline tests
        run: python scripts/test-skill-pipeline.py
      - name: Check CLI flags
        run: |
          python scripts/tools-mcp-server.py --version
          python scripts/tools-mcp-server.py --help | head -5
          count=$(python scripts/tools-mcp-server.py --list-tools | python -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "${count} tools OK"

  #  Stage 3: Memory Engine Tests 
  memory-tests:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run memory search smoke test
        run: python scripts/memory_search.py
      - name: Verify consolidate + dry-run
        run: python scripts/ci/test-memory-engine.py
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: memory-test-results
          path: data/*.json

  #  Stage 4: Skill Router Validation 
  skill-router-validation:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate all SKILL.md files exist
        run: |
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [ -f "$dir/SKILL.md" ]; then
              size=$(wc -c < "$dir/SKILL.md")
              echo "OK: $name ($size bytes)"
            else
              echo "MISSING: $name/SKILL.md"
              exit 1
            fi
          done
      - name: Check router references all local skills
        run: python scripts/ci/validate-skill-router.py

  #  Stage 5: Installer Build (Windows only) 
  build-installer:
    if: github.ref_type == 'tag'
    runs-on: windows-latest
    needs: [core-tests, memory-tests, skill-router-validation]
    steps:
      - uses: actions/checkout@v4
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
        shell: pwsh
      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" opencode-container-server.iss /Qp
        shell: pwsh
      - name: Verify artifact
        run: |
          $artifact = Get-ChildItem -Path . -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $artifact) { throw "No installer .exe found" }
          $size = [math]::Round($artifact.Length / 1MB, 1)
          Write-Host "Installer: $($artifact.Name) ($size MB)"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: opencode-container-server-setup.exe
