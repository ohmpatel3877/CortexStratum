# opencode-container-server
# Standalone compose file — download this + Dockerfile, run anywhere.
# curl -o docker-compose.yml https://raw.githubusercontent.com/ohmpatel3877/cortex-stratum/main/docker/opencode-compose.yml
# curl -o Dockerfile https://raw.githubusercontent.com/ohmpatel3877/cortex-stratum/main/docker/Dockerfile
# docker compose up -d --build

services:
  opencode-server:
    build: .
    image: ohmpatel3877/opencode-container-server:latest
    container_name: opencode-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      MEM0_API_KEY: "${MEM0_API_KEY:-}"
      MEM0_PROJECT: "opencode-container-server"
      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://api.opencode.ai}"
      OPENCODE_HOST: "${OPENCODE_HOST:-opencode-container}"
      OPENCODE_DEPLOYMENT_ID: "${OPENCODE_DEPLOYMENT_ID:-opencode-container-server}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - opencode_data:/app/data
      - opencode_data:/app/.memory
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: server

volumes:
  opencode_data:
