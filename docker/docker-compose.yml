# opencode-container-server
# One-command deploy: docker compose up -d
# Spins up the cortex-stratum MCP server + OpenCode CLI environment.
# You only need Docker. Everything else runs in the container.

services:

  opencode-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ohmpatel3877/opencode-container-server:latest
    container_name: opencode-server
    restart: unless-stopped
    ports:
      - "3100:3100"    # MCP HTTP endpoint (for external tools)
    environment:
      # ── mem0 cloud memory ──
      MEM0_API_KEY: "${MEM0_API_KEY:-}"
      MEM0_PROJECT: "opencode-container-server"
      # ── OpenCode Zen API (optional) ──
      OPENCODE_ZEN_API_KEY: "${OPENCODE_ZEN_API_KEY:-}"
      OPENCODE_ZEN_BASE_URL: "${OPENCODE_ZEN_BASE_URL:-https://api.opencode.ai}"
      OPENCODE_HOST: "${OPENCODE_HOST:-opencode-container}"
      OPENCODE_DEPLOYMENT_ID: "${OPENCODE_DEPLOYMENT_ID:-opencode-container-server}"
      # ── Logging ──
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - opencode_data:/app/data
      - opencode_data:/app/.memory
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: server

volumes:
  opencode_data:
