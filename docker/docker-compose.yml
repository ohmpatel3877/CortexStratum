# opencode-container-server — with local agent-memory-mcp backend
# One-command deploy: docker compose up -d
# Agent-memory-mcp runs as a sidecar for fully local memory.

services:

  opencode-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ohmpatel3877/opencode-container-server:latest
    container_name: opencode-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      MEMORY_BACKEND: "agent-memory-mcp"
      AGENT_MEMORY_MCP_URL: "http://memory-sidecar:3101"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - opencode_data:/app/data
      - memory_store:/app/.memory
    depends_on:
      - memory-sidecar
    command: server

  memory-sidecar:
    build:
      context: ../../agent-memory-mcp
      dockerfile: Dockerfile
    image: ohmpatel3877/agent-memory-mcp:latest
    container_name: agent-memory-mcp
    restart: unless-stopped
    ports:
      - "3101:3101"
    environment:
      KG_DB_PATH: /data/knowledge-graph
      DECAY_DB_PATH: /data/decay
      SQLITE_DB_PATH: /data/memory.db
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - memory_store:/data
    command: ["node", "dist/index.js"]

volumes:
  opencode_data:
  memory_store:
