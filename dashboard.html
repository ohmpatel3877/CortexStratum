<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ai-memory-core · MCP Server Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh;font-size:14px}

/* ── Header ── */
.header{background:#0f172a;border-bottom:1px solid #1e293b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.1rem;font-weight:600;color:#38bdf8;display:flex;align-items:center;gap:8px}
.header h1 span{color:#64748b;font-weight:400;font-size:.8rem}
.header-right{display:flex;gap:10px;align-items:center}
.status-dot{width:8px;height:8px;border-radius:999px;display:inline-block}
.status-dot.ok{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.3)}
.status-dot.loading{background:#fbbf24;animation:pulse 1s infinite}
.status-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 14px;border-radius:6px;font-size:.78rem;cursor:pointer;transition:all .15s}
.btn:hover{background:#334155;border-color:#475569}
.last-updated{color:#475569;font-size:.72rem}

/* ── Stats Bar ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:16px 24px}
.stat{background:#131c31;border:1px solid #1e293b;border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:1.6rem;font-weight:700;color:#38bdf8;line-height:1.2}
.stat .lbl{font-size:.72rem;color:#64748b;margin-top:3px}
.stat .sub{font-size:.68rem;color:#475569;margin-top:1px}
.stat .num.green{color:#4ade80}.stat .num.purple{color:#a78bfa}.stat .num.amber{color:#fbbf24}
.stat .num.rose{color:#f87171}.stat .num.teal{color:#2dd4bf}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin:0 24px;border-bottom:1px solid #1e293b;overflow-x:auto}
.tab{padding:10px 18px;font-size:.8rem;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:all .15s;white-space:nowrap}
.tab:hover{color:#e2e8f0;background:#131c31}
.tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.tab-content{display:none;padding:16px 24px}
.tab-content.active{display:block}

/* ── Cards ── */
.card{background:#131c31;border:1px solid #1e293b;border-radius:10px;margin-bottom:14px;overflow:hidden}
.card-hdr{padding:10px 14px;border-bottom:1px solid #1e293b;font-size:.8rem;font-weight:600;color:#94a3b8;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:14px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{text-align:left;padding:8px 10px;color:#64748b;font-weight:500;border-bottom:1px solid #1e293b;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #0f172a;vertical-align:top}
tr:hover td{background:#1a2438}
tr:last-child td{border-bottom:none}
tr.priority-high td:first-child{border-left:3px solid #f87171}
tr.priority-recurring td:first-child{border-left:3px solid #fbbf24;background:#1a1508}
tr.priority-recurring:hover td{background:#221d0e}
tr.priority-open td:first-child{border-left:3px solid #fb923c}

/* ── Badges ── */
.perm{display:inline-block;padding:1px 8px;border-radius:999px;font-size:.68rem;font-weight:600}
.perm-read{background:#0f3b2e;color:#4ade80}
.perm-write{background:#3b2e0f;color:#fbbf24}
.perm-mutate{background:#3b0f1a;color:#f87171}
.tag{display:inline-block;padding:1px 8px;border-radius:999px;font-size:.68rem}
.tag-arch{background:#1e1b4b;color:#a78bfa;border:1px solid #3730a3}
.tag-proc{background:#1b2e4b;color:#7dd3fc;border:1px solid #1e3a5f}
.tag-tech{background:#1b3b2e;color:#4ade80;border:1px solid #166534}
.tag-sec{background:#3b0f1a;color:#f87171;border:1px solid #7f1d1d}

/* ── Bars ── */
.bar{height:6px;border-radius:3px;background:#1e293b;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── Filters ── */
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters input{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;padding:6px 12px;border-radius:6px;font-size:.78rem;flex:1;min-width:140px}
.filters input:focus{outline:none;border-color:#38bdf8}
.filters input::placeholder{color:#475569}
.filters select{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:.78rem;cursor:pointer}
.filters select:focus{outline:none;border-color:#38bdf8}

/* ── Decision cards ── */
.d-card{padding:12px;border:1px solid #1e293b;border-radius:8px;margin-bottom:8px;font-size:.8rem}
.d-card:last-child{margin-bottom:0}
.d-card h4{color:#e2e8f0;margin-bottom:3px;font-size:.82rem}
.d-card .meta{color:#64748b;font-size:.7rem;margin-bottom:5px}
.d-card p{color:#94a3b8;line-height:1.5}

/* ── Checklist ── */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #0f172a;font-size:.8rem}
.cl-item:last-child{border-bottom:none}
.cl-dot{width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;margin-top:1px}
.cl-done{background:#0f3b2e;color:#4ade80}
.cl-pending{background:#3b2e0f;color:#fbbf24}

/* ── Goal ── */
.goal-hdr{font-size:1rem;font-weight:600;color:#e2e8f0;margin-bottom:2px}
.goal-meta{color:#64748b;font-size:.75rem;margin-bottom:12px}
.goal-pct{text-align:right;font-size:.72rem;color:#94a3b8;margin-bottom:3px}
.goal-bar{height:10px;border-radius:5px}
.goal-sub{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0f172a;font-size:.78rem}
.goal-sub:last-child{border-bottom:none}

/* ── States ── */
.empty{padding:40px 20px;text-align:center;color:#475569;font-size:.82rem}
.empty .icon{font-size:2rem;margin-bottom:8px;opacity:.3}
.error-msg{padding:20px;text-align:center;color:#f87171;font-size:.82rem}
.loading{text-align:center;padding:40px;color:#64748b;font-size:.82rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading::after{content:'';display:inline-block;width:18px;height:18px;border:2px solid #1e293b;border-top-color:#38bdf8;border-radius:999px;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}

/* ── Mobile ── */
@media(max-width:640px){
  .header h1{font-size:.95rem}
  .stats{grid-template-columns:repeat(2,1fr);margin:12px}
  .tabs{margin:0 12px}
  .tab-content{padding:12px}
  .stat .num{font-size:1.3rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>ai-memory-core <span>· MCP Server</span></h1>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div class="stats" id="statsRow">
  <div class="stat"><div class="num" id="toolCount">—</div><div class="lbl">Tools</div><div class="sub" id="toolBreakdown"></div></div>
  <div class="stat"><div class="num purple" id="memoryCount">—</div><div class="lbl">Memory</div><div class="sub" id="memorySub">local BM25</div></div>
  <div class="stat"><div class="num amber" id="errorCount">—</div><div class="lbl">Errors</div><div class="sub" id="errorSub"></div></div>
  <div class="stat"><div class="num teal" id="decisionCount">—</div><div class="lbl">Decisions</div><div class="sub" id="decisionSub"></div></div>
  <div class="stat"><div class="num rose" id="commitmentCount">—</div><div class="lbl">Commitments</div><div class="sub" id="commitmentSub"></div></div>
  <div class="stat"><div class="num green" id="goalPct">—</div><div class="lbl">Goal</div><div class="sub" id="goalSub"></div></div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="tools" onclick="switchTab('tools')">🧰 Tools</div>
  <div class="tab" data-tab="trace" onclick="switchTab('trace')">📋 Trace</div>
  <div class="tab" data-tab="decisions" onclick="switchTab('decisions')">📐 Decisions</div>
  <div class="tab" data-tab="goals" onclick="switchTab('goals')">🎯 Goals</div>
  <div class="tab" data-tab="commitments" onclick="switchTab('commitments')">✅ Commitments</div>
</div>

<div id="toolsTab" class="tab-content active"></div>
<div id="traceTab" class="tab-content"></div>
<div id="decisionsTab" class="tab-content"></div>
<div id="goalsTab" class="tab-content"></div>
<div id="commitmentsTab" class="tab-content"></div>

<script>
// ── Data ──
const DATA = {};
let TOOLS_CACHE = null;

async function loadJSON(path) {
  try {
    const r = await fetch(path + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function pBadge(p) {
  const c = p === 'read' ? 'perm-read' : p === 'write' ? 'perm-write' : 'perm-mutate';
  return `<span class="perm ${c}">${p}</span>`;
}
function tCat(c) {
  const m = {architecture:'tag-arch',process:'tag-proc',technology:'tag-tech',security:'tag-sec'};
  const cls = m[c] || '';
  return cls ? `<span class="tag ${cls}">${c}</span>` : '';
}
function fd(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString(); } catch { return String(d).slice(0,10); }
}
function priorityClass(e) {
  if (e.status === 'recurring') return 'priority-recurring';
  if (e.status === 'unresolved' && (e.occurrence_count || 1) >= 3) return 'priority-high';
  if (e.status === 'unresolved') return 'priority-open';
  return '';
}

// ── Load ──
async function loadAll() {
  document.getElementById('statusDot').className = 'status-dot loading';
  document.getElementById('lastUpdated').textContent = 'loading...';

  DATA.tools = await loadJSON('./data/tool-inventory.json');
  DATA.errors = await loadJSON('./data/error-registry.json');
  DATA.decisions = await loadJSON('./data/decision-registry.json');
  DATA.commitments = await loadJSON('./data/commitments.json');
  DATA.goal = await loadJSON('./data/goal-registry.json');

  // Try memory store
  let memCount = 0;
  const ms = await loadJSON('./data/memory_store.json');
  if (ms) memCount = Array.isArray(ms) ? ms.length : (ms.entries || ms.memories || []).length;

  // Stats
  if (DATA.tools) {
    const r = DATA.tools.filter(t => t.permission === 'read').length;
    const w = DATA.tools.filter(t => t.permission === 'write').length;
    const m = DATA.tools.filter(t => t.permission === 'mutate').length;
    document.getElementById('toolCount').textContent = DATA.tools.length;
    document.getElementById('toolBreakdown').textContent = r + 'r / ' + w + 'w / ' + m + 'm';
    TOOLS_CACHE = DATA.tools;
  }

  document.getElementById('memoryCount').textContent = memCount || '0';

const errList = DATA.errors?.errors || [];
const resolved = errList.filter(e => e.status === 'resolved').length;
const recurring = errList.filter(e => e.status === 'recurring').length;
document.getElementById('errorCount').textContent = errList.length;
document.getElementById('errorSub').textContent = resolved + ' resolved' + (recurring ? ', ' + recurring + ' recurring' : '') + ', ' + (errList.length - resolved - recurring) + ' open';

  const decList = DATA.decisions?.decisions || [];
  document.getElementById('decisionCount').textContent = decList.length;
  const cats = {}; decList.forEach(d => { cats[d.category] = (cats[d.category]||0)+1; });
  document.getElementById('decisionSub').textContent = Object.entries(cats).map(([k,v]) => k+':'+v).join(' · ') || 'none';

  const comList = DATA.commitments?.commitments || [];
  document.getElementById('commitmentCount').textContent = comList.length;
  const verified = comList.filter(c => (c.verified_sessions||[]).length > 0).length;
  document.getElementById('commitmentSub').textContent = verified + ' verified';

  if (DATA.goal) {
    const subs = DATA.goal.sub_goals || [];
    const done = subs.filter(s => s.status === 'completed').length;
    const pct = subs.length > 0 ? Math.round(done/subs.length*100) : 0;
    document.getElementById('goalPct').textContent = pct + '%';
    document.getElementById('goalSub').textContent = done + '/' + subs.length + ' sub-goals';
  } else {
    document.getElementById('goalPct').textContent = '—';
    document.getElementById('goalSub').textContent = 'no active goal';
  }

  renderTools();
  renderTrace();
  renderDecisions();
  renderGoals();
  renderCommitments();

  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  document.getElementById('statusDot').className = 'status-dot ok';
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(name + 'Tab').classList.add('active');
}

// ── Render: Tools ──
function renderTools() {
  const tools = DATA.tools;
  if (!tools) { document.getElementById('toolsTab').innerHTML = '<div class="empty"><div class="icon">⚙</div>Tool inventory not found. Run the MCP server first.</div>'; return; }

  const modules = [...new Set(tools.map(t => t.module || 'core'))].sort();

  let html = `
    <div class="filters">
      <input type="text" id="toolSearch" placeholder="Search tools..." oninput="filterTools()">
      <select id="permFilter" onchange="filterTools()">
        <option value="all">All permissions</option>
        <option value="read">read</option>
        <option value="write">write</option>
        <option value="mutate">mutate</option>
      </select>
      <select id="modFilter" onchange="filterTools()">
        <option value="all">All modules</option>
        ${modules.map(m => `<option value="${m}">${m}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
    <table><thead><tr>
      <th>Tool</th><th>Permission</th><th>Module</th><th>Description</th><th>Params</th>
    </tr></thead><tbody>
    ${tools.map(t => `
      <tr class="trow" data-name="${t.name}" data-perm="${t.permission}" data-mod="${t.module||'core'}">
        <td style="font-family:monospace;font-size:.75rem;color:#7dd3fc">${t.name}</td>
        <td>${pBadge(t.permission)}</td>
        <td style="color:#94a3b8">${t.module||'core'}</td>
        <td style="color:#94a3b8;max-width:280px">${(t.description||'').slice(0,110)}</td>
        <td style="color:#475569;font-size:.72rem">${t.param_count||'?'}</td>
      </tr>
    `).join('')}
    </tbody></table></div>
  `;
  document.getElementById('toolsTab').innerHTML = html;
}

window.filterTools = function() {
  const q = (document.getElementById('toolSearch')?.value||'').toLowerCase();
  const p = document.getElementById('permFilter')?.value||'all';
  const m = document.getElementById('modFilter')?.value||'all';
  document.querySelectorAll('.trow').forEach(r => {
    r.style.display = (!q || r.dataset.name.includes(q)) && (p==='all'||r.dataset.perm===p) && (m==='all'||r.dataset.mod===m) ? '' : 'none';
  });
};

// ── Render: Trace (Error Registry) ──
function renderTrace() {
  if (!DATA.errors) { document.getElementById('traceTab').innerHTML = '<div class="empty"><div class="icon">📋</div>No error registry data.</div>'; return; }
  const list = DATA.errors.errors || [];
  if (list.length === 0) { document.getElementById('traceTab').innerHTML = '<div class="empty"><div class="icon">✅</div>No errors logged. Clean run.</div>'; return; }

  const sorted = [...list].sort((a,b) => (b.occurrence_count||0) - (a.occurrence_count||0));
  const maxOcc = Math.max(...sorted.map(e => e.occurrence_count||0), 1);

  let html = '<div class="card"><div class="card-hdr">Error Registry <span>'+list.length+' entries · '+list.filter(e=>e.status==='resolved').length+' resolved</span></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Signature</th><th>Status</th><th>Freq</th><th>Seen</th><th>Cause</th></tr></thead><tbody>';
  sorted.forEach(e => {
    const pct = Math.min(100, ((e.occurrence_count||1)/maxOcc*100).toFixed(0));
    const pri = priorityClass(e);
    const isRecurring = e.status === 'recurring';
    const isResolved = e.status === 'resolved';
    const isHighFreq = e.status === 'unresolved' && (e.occurrence_count||1) >= 3;
    // Bar color: green = resolved clean, amber = recurring, red = high-freq unresolved, orange = plain unresolved
    const barColor = isResolved ? '#4ade80' : isRecurring ? '#fbbf24' : isHighFreq ? '#f87171' : '#fb923c';

    html += `<tr class="${pri}">
      <td style="font-family:monospace;color:#475569;font-size:.7rem">${e.id||'—'}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;color:#e2e8f0">${(e.error_signature||e.command||'?').slice(0,55)}</td>
      <td>
        <span class="perm ${isResolved?'perm-read':'perm-write'}">${e.status||'unknown'}</span>
        ${isRecurring ? '<span class="perm" style="background:#3b2e0f;color:#fbbf24;border:1px solid #854d0e">↻ recurring</span>' : ''}
      </td>
      <td><div style="display:flex;align-items:center;gap:6px"><span>${e.occurrence_count||1}x</span><div class="bar" style="width:60px"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div></div></td>
      <td style="color:#475569;font-size:.72rem">${fd(e.last_seen)}</td>
      <td style="color:#94a3b8;max-width:180px;overflow:hidden;text-overflow:ellipsis">${e.root_cause||'—'}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div></div>';
  document.getElementById('traceTab').innerHTML = html;
}

// ── Render: Decisions ──
function renderDecisions() {
  if (!DATA.decisions) { document.getElementById('decisionsTab').innerHTML = '<div class="empty"><div class="icon">📐</div>No decision registry data.</div>'; return; }
  const list = DATA.decisions.decisions || [];
  if (list.length === 0) { document.getElementById('decisionsTab').innerHTML = '<div class="empty"><div class="icon">📐</div>No decisions recorded.</div>'; return; }

  let html = '';
  [...list].reverse().forEach(d => {
    html += `<div class="d-card">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <h4>${d.title||'Untitled'}</h4>
        <div>${tCat(d.category)} ${d.status==='active'?'<span class="perm perm-read">active</span>':'<span class="perm perm-write">'+d.status+'</span>'}</div>
      </div>
      <div class="meta">${d.id||''} · ${fd(d.created_at)}</div>
      <p><strong>Decision:</strong> ${d.decision||'—'}</p>
      ${d.context ? '<p style="margin-top:5px"><strong>Context:</strong> '+d.context+'</p>' : ''}
      ${d.rationale ? '<p style="margin-top:5px"><strong>Rationale:</strong> '+d.rationale+'</p>' : ''}
    </div>`;
  });
  document.getElementById('decisionsTab').innerHTML = '<div class="card"><div class="card-hdr">Decision Registry <span>'+list.length+' entries</span></div><div class="card-body">'+html+'</div></div>';
}

// ── Render: Goals ──
function renderGoals() {
  if (!DATA.goal) { document.getElementById('goalsTab').innerHTML = '<div class="empty"><div class="icon">🎯</div>No goal data.</div>'; return; }
  const g = DATA.goal;
  const subs = g.sub_goals || [];
  const done = subs.filter(s => s.status === 'completed').length;
  const pct = subs.length > 0 ? Math.round(done/subs.length*100) : 0;

  if (!g.original_goal) { document.getElementById('goalsTab').innerHTML = '<div class="empty"><div class="icon">🎯</div>No active goal.</div>'; return; }

  let html = '<div class="card"><div class="card-hdr">Goal Registry</div><div class="card-body">';
  html += '<div class="goal-hdr">'+(g.original_goal||'Untitled')+'</div>';
  html += '<div class="goal-meta">Session: '+(g.session_id||'—')+'</div>';

  if (subs.length > 0) {
    html += '<div class="goal-pct">'+pct+'% complete</div><div class="bar goal-bar"><div class="bar-fill" style="width:'+pct+'%;background:#a78bfa"></div></div>';
    html += '<div style="margin-top:10px">';
    subs.forEach(s => {
      const d = s.status === 'completed';
      html += `<div class="goal-sub"><span>${s.description||'Untitled'}</span><span class="perm ${d?'perm-read':'perm-write'}">${d?'✅ done':'⏳ '+s.status}</span></div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="empty">No sub-goals defined.</div>';
  }
  html += '</div></div>';
  document.getElementById('goalsTab').innerHTML = html;
}

// ── Render: Commitments ──
function renderCommitments() {
  if (!DATA.commitments) { document.getElementById('commitmentsTab').innerHTML = '<div class="empty"><div class="icon">✅</div>No commitment data.</div>'; return; }
  const list = DATA.commitments.commitments || [];
  if (list.length === 0) { document.getElementById('commitmentsTab').innerHTML = '<div class="empty"><div class="icon">✅</div>No commitments defined.</div>'; return; }

  let html = '<div class="card"><div class="card-hdr">Commitments <span>'+list.length+' total</span></div><div class="card-body">';
  list.forEach(c => {
    const sessions = c.verified_sessions || [];
    const v = sessions.length > 0;
    html += `<div class="cl-item">
      <div class="cl-dot ${v?'cl-done':'cl-pending'}">${v?'✓':'·'}</div>
      <div style="flex:1">
        <div style="color:#e2e8f0">${c.text||'Untitled'}</div>
        <div style="color:#475569;font-size:.7rem;margin-top:2px">${v?'Verified in '+sessions.length+' session(s)':'Not yet verified'} · Next: ${fd(c.next_verify)}</div>
      </div>
    </div>`;
  });
  html += '</div></div>';
  document.getElementById('commitmentsTab').innerHTML = html;
}

// ── Init ──
loadAll();
</script>
</body>
</html>
